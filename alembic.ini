[alembic]
# Location of migration scripts
script_location = %(here)s/alembic

# Timestamp-prefixed migration filenames
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Project root is added to sys.path by alembic/env.py
prepend_sys_path = .

path_separator = os

# sqlalchemy.url is set programmatically in alembic/env.py from the DATABASE_URL env var.
# Do not put credentials here.
sqlalchemy.url =


[post_write_hooks]
# Uncomment to auto-format new migration files with ruff
# hooks = ruff
# ruff.type = exec
# ruff.executable = ruff
# ruff.options = format REVISION_SCRIPT_FILENAME


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
